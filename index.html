<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>桃園 YouBike 專屬監測站</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background-color: #f5f5f5; }
    
    .header-section { margin-bottom: 20px; }
    .status-badge { font-size: 14px; padding: 5px 12px; border-radius: 12px; background-color: #e6f7ff; color: #0050b3; display: inline-block; font-weight: bold; }
    
    /* 🌟 新增：專門用來包裝「同一排卡片」的容器 */
    .station-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; width: 100%; }
    
    .station-card { 
      background-color: white; 
      border: 1px solid #e0e0e0; 
      padding: 20px; 
      border-radius: 10px; 
      width: 280px; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
    }
    .station-name { margin-top: 0; font-size: 18px; color: #333; border-bottom: 2px solid #ff9900; padding-bottom: 8px; }
    .number { font-size: 28px; font-weight: bold; color: #ff9900; }
    
    /* 🌟 新增：當數字為 0 時，會套用這個紅色的樣式 */
    .number.zero { color: #ff4d4f; } 
    
    .label { font-size: 14px; color: #666; }
  </style>
</head>
<body>

  <div class="header-section">
    <h2>🚲 我的 YouBike 監測站</h2>
    <div class="status-badge" id="connection-status">TDX 連線中...</div>
    <span style="font-size: 14px; color: #888; margin-left: 10px;">最後更新：<span id="update-time">-</span></span>
  </div>

  <div id="stations-container">
    <p style="color: #888;">資料載入中，請稍候...</p>
  </div>

  <script>
    // ==========================================
    // 🔑 請再次填入你的 TDX 金鑰
    // ==========================================
    const clientId = 'yhliu1017-122802c7-3c9a-400d';
    const clientSecret = '109b5144-5371-4298-9eae-14e7f7916193';
    
    // 🌟 核心修改 1：使用「二維陣列」自訂排版
    // 每一組中括號 [] 代表「一排 (Row)」
    const stationLayout = [
      ['領航站', '陽光劇場'],  // 第一排
      ['領航北大安街口']            // 第二排
    ]; 

    async function fetchYoubikeData() {
      try {
        const tokenUrl = 'https://tdx.transportdata.tw/auth/realms/TDXConnect/protocol/openid-connect/token';
        const authParams = new URLSearchParams({
          grant_type: 'client_credentials',
          client_id: clientId,
          client_secret: clientSecret
        });

        const tokenRes = await fetch(tokenUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: authParams
        });
        
        if (!tokenRes.ok) throw new Error('無法取得 Token');
        const tokenData = await tokenRes.json();
        const token = tokenData.access_token;

        const apiHeaders = { 'Authorization': `Bearer ${token}` };
        
        const [stationRes, availableRes] = await Promise.all([
          fetch('https://tdx.transportdata.tw/api/basic/v2/Bike/Station/City/Taoyuan?%24format=JSON', { headers: apiHeaders }),
          fetch('https://tdx.transportdata.tw/api/basic/v2/Bike/Availability/City/Taoyuan?%24format=JSON', { headers: apiHeaders })
        ]);

        const stations = await stationRes.json();
        const availabilities = await availableRes.json();

        const container = document.getElementById('stations-container');
        container.innerHTML = '';
        let loadedCount = 0;

        // 🌟 核心修改 2：依照我們定義的版面結構來建立卡片
        stationLayout.forEach(rowKeywords => {
          // 建立一個橫排的空箱子
          const rowDiv = document.createElement('div');
          rowDiv.className = 'station-row';

          rowKeywords.forEach(keyword => {
            const station = stations.find(s => s.StationName.Zh_tw.includes(keyword));
            
            if (station) {
              const status = availabilities.find(a => a.StationUID === station.StationUID);
              
              // 取得數字，如果找不到資料預設為 0
              const sbi = status ? status.AvailableRentBikes : 0;
              const bemp = status ? status.AvailableReturnBikes : 0;

              // 🌟 核心修改 3：判斷式 - 如果數字是 0，就加上 'zero' 這個 CSS Class
              const sbiClass = sbi === 0 ? 'number zero' : 'number';
              const bempClass = bemp === 0 ? 'number zero' : 'number';

              const card = document.createElement('div');
              card.className = 'station-card';
              
              // 在產生的 HTML 中套用剛剛決定好的 Class
              card.innerHTML = `
                <h3 class="station-name">${station.StationName.Zh_tw}</h3>
                <p><span class="label">可借車輛：</span> <span class="${sbiClass}">${sbi}</span> <span class="label">台</span></p>
                <p><span class="label">可還空位：</span> <span class="${bempClass}">${bemp}</span> <span class="label">格</span></p>
              `;
              
              rowDiv.appendChild(card);
              loadedCount++;
            }
          });

          // 如果這一排有成功裝入卡片，才把它放到畫面上
          if (rowDiv.childNodes.length > 0) {
            container.appendChild(rowDiv);
          }
        });
        
        if (loadedCount === 0) {
          container.innerHTML = '<p style="color: red;">找不到符合任何關鍵字的站點</p>';
        }

        document.getElementById('connection-status').innerText = `成功載入 ${loadedCount} 個站點`;
        document.getElementById('connection-status').style.backgroundColor = '#f6ffed';
        document.getElementById('connection-status').style.color = '#389e0d';
        
        const now = new Date();
        document.getElementById('update-time').innerText = now.toLocaleTimeString();

      } catch (error) {
        console.error('TDX 資料抓取失敗:', error);
        document.getElementById('connection-status').innerText = 'TDX 連線失敗';
        document.getElementById('connection-status').style.backgroundColor = '#fff1f0';
        document.getElementById('connection-status').style.color = '#cf1322';
      }
    }

    fetchYoubikeData();
    setInterval(fetchYoubikeData, 60000);
  </script>

</body>
</html>
